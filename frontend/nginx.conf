server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container (see docker-compose.yml).
    # Keeps the frontend code using the same relative "/api" path in
    # dev, Docker, and production — no VITE_API_BASE_URL needed here.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
