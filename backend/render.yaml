# Render Blueprint — deploy the backend as a free web service.
# In the Render dashboard: New -> Blueprint -> point at this repo,
# set "Root Directory" to `backend` if this file isn't at the repo root.
services:
  - type: web
    name: face-attendance-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: CORS_EXTRA_ORIGINS
        value: "" # set this to your Vercel URL after the frontend is deployed
